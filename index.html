<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ツムツム風パズルゲーム</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            user-select: none;
            touch-action: none;
        }
        #game-container {
            margin-top: 20px;
            position: relative;
        }
        #score-board {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        canvas {
            background-color: #ffeaa7;
            border: 4px solid #ffb142;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="score-board">SCORE: <span id="score">0</span></div>
        <canvas id="gameCanvas" width="360" height="500"></canvas>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreDisplay = document.getElementById('score');

// ゲーム設定
const BALL_RADIUS = 22;
const COLORS = ['#ff7675', '#74b9ff', '#55efc4', '#ffeaa7', '#a29bfe']; // キャラの色（5色）
const GRAVITY = 0.4;
const FRICTION = 0.98;
const MAX_BALLS = 45;

let balls = [];
let selectedBalls = [];
let isDragging = false;
let score = 0;

// ボール（キャラクター）クラス
class Ball {
    constructor(x, y, colorIndex) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 2;
        this.vy = 0;
        this.radius = BALL_RADIUS;
        this.colorIndex = colorIndex;
        this.color = COLORS[colorIndex];
    }

    update() {
        this.vy += GRAVITY;
        this.vx *= FRICTION;
        this.vy *= FRICTION;
        this.x += this.vx;
        this.y += this.vy;

        // 壁との衝突（左右）
        if (this.x - this.radius < 0) {
            this.x = this.radius;
            this.vx *= -0.4;
        } else if (this.x + this.radius > canvas.width) {
            this.x = canvas.width - this.radius;
            this.vx *= -0.4;
        }

        // 床との衝突
        if (this.y + this.radius > canvas.height) {
            this.y = canvas.height - this.radius;
            this.vy *= -0.3; // 跳ね返り
            this.vx *= 0.8;  // 床の摩擦
        }
    }

    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
        
        // 選択されている場合は枠線を描画
        if (selectedBalls.includes(this)) {
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 4;
            ctx.stroke();
        } else {
            ctx.strokeStyle = 'rgba(0,0,0,0.1)';
            ctx.lineWidth = 1;
            ctx.stroke();
        }

        // 簡単な「目」を描画してキャラクター感を出す
        ctx.fillStyle = '#2d3436';
        ctx.beginPath();
        ctx.arc(this.x - 6, this.y - 2, 2, 0, Math.PI * 2);
        ctx.arc(this.x + 6, this.y - 2, 2, 0, Math.PI * 2);
        ctx.fill();
    }
}

// ボール同士の衝突判定と位置補正（簡易物理演算）
function resolveCollisions() {
    for (let i = 0; i < balls.length; i++) {
        for (let j = i + 1; j < balls.length; j++) {
            let b1 = balls[i];
            let b2 = balls[j];

            let dx = b2.x - b1.x;
            let dy = b2.y - b1.y;
            let distance = Math.sqrt(dx * dx + dy * dy);
            let minDist = b1.radius + b2.radius;

            if (distance < minDist) {
                // 重なりを解消する方向
                let overlap = minDist - distance;
                let nx = dx / distance;
                let ny = dy / distance;

                // 位置の補正（お互い半分ずつ押し出す）
                b1.x -= nx * overlap * 0.5;
                b1.y -= ny * overlap * 0.5;
                b2.x += nx * overlap * 0.5;
                b2.y += ny * overlap * 0.5;

                // 速度の反発
                let kx = b1.vx - b2.vx;
                let ky = b1.vy - b2.vy;
                let p = 2 * (nx * kx + ny * ky) / 2; // 質量は同じとする

                b1.vx -= p * nx * 0.5;
                b1.vy -= p * ny * 0.5;
                b2.vx += p * nx * 0.5;
                b2.vy += p * ny * 0.5;
            }
        }
    }
}

// ボールの補充
function spawnBalls() {
    while (balls.length < MAX_BALLS) {
        let x = Math.random() * (canvas.width - BALL_RADIUS * 2) + BALL_RADIUS;
        let y = -BALL_RADIUS - (Math.random() * 100); // 画面上部から時間差で落とす
        let colorIndex = Math.floor(Math.random() * COLORS.length);
        balls.push(new Ball(x, y, colorIndex));
    }
}

// 2点間の距離計算
function getDistance(x1, y1, x2, y2) {
    return Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
}

// マウス・タッチ位置の取得
function getMousePos(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return {
        x: clientX - rect.left,
        y: clientY - rect.top
    };
}

// イベントリスナー（操作系）
function handleStart(e) {
    isDragging = true;
    const pos = getMousePos(e);
    
    // クリックした位置にボールがあるかチェック
    for (let ball of balls) {
        if (getDistance(pos.x, pos.y, ball.x, ball.y) < ball.radius) {
            selectedBalls = [ball];
            break;
        }
    }
}

function handleMove(e) {
    if (!isDragging || selectedBalls.length === 0) return;
    const pos = getMousePos(e);
    const lastBall = selectedBalls[selectedBalls.length - 1];

    for (let ball of balls) {
        // すでに選択されておらず、同じ色で、直前のボールと距離が近い場合
        if (!selectedBalls.includes(ball) && 
            ball.colorIndex === lastBall.colorIndex && 
            getDistance(lastBall.x, lastBall.y, ball.x, ball.y) < BALL_RADIUS * 2.5) {
            
            // マウスの近くにあるかもチェック
            if (getDistance(pos.x, pos.y, ball.x, ball.y) < ball.radius * 1.5) {
                selectedBalls.push(ball);
            }
        }
    }
}

function handleEnd() {
    if (!isDragging) return;
    isDragging = false;

    // 3個以上繋がっていたら消去
    if (selectedBalls.length >= 3) {
        // スコア計算（消した数に応じてボーナス）
        let points = selectedBalls.length * 100 + (selectedBalls.length - 3) * 50;
        score += points;
        scoreDisplay.textContent = score;

        // ボール配列から削除
        balls = balls.filter(ball => !selectedBalls.includes(ball));
    }

    selectedBalls = [];
}

// マウスイベント
canvas.addEventListener('mousedown', handleStart);
canvas.addEventListener('mousemove', handleMove);
window.addEventListener('mouseup', handleEnd);

// タッチイベント（スマホ対応）
canvas.addEventListener('touchstart', handleStart);
canvas.addEventListener('touchmove', handleMove);
window.addEventListener('touchend', handleEnd);


// メインループ
function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 物理演算と更新
    resolveCollisions();
    balls.forEach(ball => ball.update());

    // 補充
    spawnBalls();

    // 描画
    balls.forEach(ball => ball.draw());

    // 繋がっている線を引く
    if (selectedBalls.length > 1) {
        ctx.beginPath();
        ctx.moveTo(selectedBalls[0].x, selectedBalls[0].y);
        for (let i = 1; i < selectedBalls.length; i++) {
            ctx.lineTo(selectedBalls[i].x, selectedBalls[i].y);
        }
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 5;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.stroke();
    }

    requestAnimationFrame(gameLoop);
}

// ゲーム開始
gameLoop();
</script>
</body>
</html>
